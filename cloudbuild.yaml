steps:
  # Step b: Docker Build
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/ai-server/ci-demo-app:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/ai-server/ci-demo-app:latest'
      - '.'

  # Step c: Docker Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/ai-server/ci-demo-app'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/ai-server/ci-demo-app:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/ai-server/ci-demo-app:latest'

options:
  logging: CLOUD_LOGGING_ONLY






